<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="dashboard.html" class="home-link">🏠 Dashboard</a>

    <div class="container">
        <div id="start-screen" class="screen">
            <h1>General Knowledge Quiz</h1>
            
            <div class="settings-box">
                <div class="setting-item">
                    <label>Questions to Attempt:</label>
                    <input type="number" id="num-questions" min="1" value="10" style="width: 60px; padding: 5px;">
                </div>

                <div class="setting-item">
                    <label>Select Categories:</label>
                    <div id="category-list" class="cat-selection-box">
                        </div>
                </div>
                
                <div class="setting-item checkbox-item" style="margin-top:15px;">
                    <input type="checkbox" id="show-explain" checked>
                    <label for="show-explain">Show Explanations</label>
                </div>
            </div>

            <button onclick="startQuiz()" class="btn start-btn">Start Quiz</button>
            <p id="error-msg" style="color:red; display:none; margin-top:10px;">Error</p>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="header">
                <div class="stats-box">
                    <span id="question-counter">Q: 1/10</span>
                    <span id="score-display">Score: 0</span>
                </div>
                <div class="timer-box" id="timer-display">60s</div>
            </div>
            
            <div class="question-container">
                <span id="q-tag" class="category-tag">General</span>
                <h2 id="question-text">?</h2>
                <div id="media-container"></div>
            </div>

            <div class="options-container" id="options-container"></div>

            <div id="explanation-container" class="explanation-box hidden">
                <h3>Explanation:</h3>
                <p id="explain-text"></p>
                <div id="explain-media"></div>
                <a id="explain-link" href="#" target="_blank">Learn More</a>
            </div>

            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Next Question</button>
        </div>

        <div id="result-screen" class="screen hidden">
            <h2>Quiz Completed!</h2>
            <div class="final-score" id="final-score">0</div>
            <p id="feedback-msg"></p>
            <button onclick="restartQuiz()" class="btn start-btn">Play Again</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
